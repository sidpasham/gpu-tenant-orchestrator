apiVersion: batch/v1
kind: Job
metadata:
  name: customer-{{ .Values.customerId }}-slurm-submitter
  labels:
    customer: {{ .Values.customerId | quote }}
    tier: {{ .Values.tier | quote }}
  annotations:
    gpu-tenant-orchestrator.io/assigned-region: {{ .Values.assignedRegion | quote }}
    gpu-tenant-orchestrator.io/assigned-cluster: {{ .Values.assignedCluster | quote }}
    gpu-tenant-orchestrator.io/gpu-pool-id: {{ .Values.gpuPoolId | quote }}
    gpu-tenant-orchestrator.io/gpu-type: {{ .Values.gpuType | quote }}
    gpu-tenant-orchestrator.io/reservation-id: {{ .Values.reservationId | quote }}
    gpu-tenant-orchestrator.io/latency-ms: {{ .Values.latencyMs | quote }}
spec:
  template:
    metadata:
      labels:
        customer: {{ .Values.customerId | quote }}
        tier: {{ .Values.tier | quote }}
      annotations:
        gpu-tenant-orchestrator.io/assigned-region: {{ .Values.assignedRegion | quote }}
        gpu-tenant-orchestrator.io/assigned-cluster: {{ .Values.assignedCluster | quote }}
        gpu-tenant-orchestrator.io/gpu-pool-id: {{ .Values.gpuPoolId | quote }}
        gpu-tenant-orchestrator.io/gpu-type: {{ .Values.gpuType | quote }}
        gpu-tenant-orchestrator.io/reservation-id: {{ .Values.reservationId | quote }}
        gpu-tenant-orchestrator.io/latency-ms: {{ .Values.latencyMs | quote }}
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
{{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
{{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
{{ toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: slurm-cli
        image: {{ .Values.image | quote }}
        imagePullPolicy: {{ .Values.imagePullPolicy | quote }}
        command: ["/bin/sh", "/opt/slurm-scripts/submit_job.sh"]
        env:
        - name: CUSTOMER_ID
          value: {{ .Values.customerId | quote }}
        - name: GPU_COUNT
          value: {{ .Values.gpuCount | quote }}
        - name: MOCK_GPU
          value: {{ .Values.mockGpu | quote }}
        - name: GPU_TYPE
          value: {{ .Values.gpuType | quote }}
        - name: ASSIGNED_REGION
          value: {{ .Values.assignedRegion | quote }}
        - name: ASSIGNED_CLUSTER
          value: {{ .Values.assignedCluster | quote }}
        - name: GPU_POOL_ID
          value: {{ .Values.gpuPoolId | quote }}
        - name: RESERVATION_ID
          value: {{ .Values.reservationId | quote }}
        - name: LATENCY_MS
          value: {{ .Values.latencyMs | quote }}
        resources:
          limits:
            {{- if .Values.mockGpu }}
            cpu: {{ .Values.mockCpu | quote }}
            {{- else }}
            nvidia.com/gpu: {{ .Values.gpuCount | quote }}
            {{- end }}
          requests:
            {{- if .Values.mockGpu }}
            cpu: {{ .Values.mockCpu | quote }}
            {{- else }}
            nvidia.com/gpu: {{ .Values.gpuCount | quote }}
            {{- end }}
        volumeMounts:
        - name: script-volume
          mountPath: /opt/slurm-scripts
      volumes:
      - name: script-volume
        configMap:
          name: customer-{{ .Values.customerId }}-slurm-script
          defaultMode: 0755
      restartPolicy: Never
  backoffLimit: 1
