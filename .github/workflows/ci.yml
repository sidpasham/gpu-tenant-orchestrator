name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run unit tests
        run: python -m pytest -q

      - name: Compile Python modules
        run: |
          python -m py_compile \
            src/api/main.py \
            src/shared/config.py \
            src/temporal/activities.py \
            src/temporal/worker.py \
            src/temporal/workflows.py

      - name: Validate shell scripts
        run: bash -n scripts/local-kubernetes-deploy.sh

      - name: Validate Grafana dashboard JSON
        run: jq empty deploy/monitoring/grafana/dashboards/gpu-tenant-metrics.json

      - name: Validate Kubernetes manifest YAML
        run: |
          python -c "from pathlib import Path; import yaml; [list(yaml.safe_load_all(path.read_text())) for path in Path('deploy/kubernetes/rancher-desktop').glob('*.yaml')]"
