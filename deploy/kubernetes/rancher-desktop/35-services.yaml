# Exposes Kafka inside the local Kubernetes cluster.
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: gpu-tenant-orchestrator
spec:
  selector:
    app.kubernetes.io/name: kafka
  ports:
    - name: broker
      port: 29092
      targetPort: broker
---
# Exposes Temporal frontend and UI ports inside the local Kubernetes cluster.
apiVersion: v1
kind: Service
metadata:
  name: temporal
  namespace: gpu-tenant-orchestrator
spec:
  selector:
    app.kubernetes.io/name: temporal
  ports:
    - name: frontend
      port: 7233
      targetPort: frontend
    - name: ui
      port: 8080
      targetPort: ui
---
# Exposes the API deployment inside the cluster and to the API Ingress.
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: gpu-tenant-orchestrator
spec:
  selector:
    app.kubernetes.io/name: gpu-tenant-api
  ports:
    - name: http
      port: 8000
      targetPort: http
---
# Exposes the worker health and metrics port for probes and Prometheus.
apiVersion: v1
kind: Service
metadata:
  name: worker
  namespace: gpu-tenant-orchestrator
spec:
  selector:
    app.kubernetes.io/name: gpu-tenant-worker
  ports:
    - name: health
      port: 8081
      targetPort: health
---
# Exposes Prometheus inside the cluster and to the Prometheus Ingress.
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: gpu-tenant-orchestrator
spec:
  selector:
    app.kubernetes.io/name: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: http
---
# Exposes Grafana inside the cluster and to the Grafana Ingress.
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: gpu-tenant-orchestrator
spec:
  selector:
    app.kubernetes.io/name: grafana
  ports:
    - name: http
      port: 3000
      targetPort: http
