# Routes local HTTP traffic for the public API gateway.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api
  namespace: gpu-tenant-orchestrator
spec:
  rules:
    - host: gpu-tenant.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  name: http
