# Routes local HTTP traffic for the Prometheus UI.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prometheus
  namespace: gpu-tenant-orchestrator
spec:
  rules:
    - host: prometheus.gpu-tenant.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prometheus
                port:
                  name: http
