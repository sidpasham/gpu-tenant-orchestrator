# Routes local HTTP traffic for the Grafana UI.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: gpu-tenant-orchestrator
spec:
  rules:
    - host: grafana.gpu-tenant.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  name: http
