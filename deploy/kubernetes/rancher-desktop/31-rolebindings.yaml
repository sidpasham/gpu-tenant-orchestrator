# Binds the worker service account to the Helm management ClusterRole.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: gpu-tenant-worker-helm
subjects:
  - kind: ServiceAccount
    name: gpu-tenant-worker
    namespace: gpu-tenant-orchestrator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: gpu-tenant-worker-helm
