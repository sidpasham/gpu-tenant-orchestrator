# Routes local HTTP traffic for the Temporal UI.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: temporal-ui
  namespace: gpu-tenant-orchestrator
spec:
  rules:
    - host: temporal.gpu-tenant.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: temporal
                port:
                  name: ui
