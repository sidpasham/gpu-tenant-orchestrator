# Exposes Temporal frontend and UI ports inside the local Kubernetes cluster.
apiVersion: v1
kind: Service
metadata:
  name: temporal
  namespace: gpu-tenant-orchestrator
spec:
  selector:
    app.kubernetes.io/name: temporal
  ports:
    - name: frontend
      port: 7233
      targetPort: frontend
    - name: ui
      port: 8080
      targetPort: ui
