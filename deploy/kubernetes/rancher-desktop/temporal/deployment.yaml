# Runs the local Temporal dev server used by the worker and workflows.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal
  namespace: gpu-tenant-orchestrator
  labels:
    app.kubernetes.io/name: temporal
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: temporal
  template:
    metadata:
      labels:
        app.kubernetes.io/name: temporal
    spec:
      containers:
        - name: temporal
          image: temporalio/admin-tools:1.22.0
          command: ["temporal"]
          args:
            - server
            - start-dev
            - --ip
            - 0.0.0.0
            - --ui-ip
            - 0.0.0.0
            - --ui-port
            - "8080"
          ports:
            - name: frontend
              containerPort: 7233
            - name: ui
              containerPort: 8080
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
