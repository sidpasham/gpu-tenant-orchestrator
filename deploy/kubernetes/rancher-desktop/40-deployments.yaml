# Runs the local single-node Kafka broker used for allocation and DLQ topics.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: gpu-tenant-orchestrator
  labels:
    app.kubernetes.io/name: kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kafka
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kafka
    spec:
      containers:
        - name: kafka
          image: apache/kafka:3.7.0
          ports:
            - name: broker
              containerPort: 29092
            - name: controller
              containerPort: 9093
          env:
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: broker,controller
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: 1@localhost:9093
            - name: KAFKA_LISTENERS
              value: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
            - name: KAFKA_ADVERTISED_LISTENERS
              value: PLAINTEXT://$(KAFKA_SERVICE_HOST):29092
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: PLAINTEXT
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: CONTROLLER
            - name: KAFKA_LOG_DIRS
              value: /tmp/kraft-combined-logs
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS
              value: "0"
          readinessProbe:
            tcpSocket:
              port: broker
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 768Mi
            limits:
              cpu: "1"
              memory: 1536Mi
---
# Runs the local Temporal dev server used by the worker and workflows.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal
  namespace: gpu-tenant-orchestrator
  labels:
    app.kubernetes.io/name: temporal
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: temporal
  template:
    metadata:
      labels:
        app.kubernetes.io/name: temporal
    spec:
      containers:
        - name: temporal
          image: temporalio/admin-tools:1.22.0
          command: ["temporal"]
          args:
            - server
            - start-dev
            - --ip
            - 0.0.0.0
            - --ui-ip
            - 0.0.0.0
            - --ui-port
            - "8080"
          ports:
            - name: frontend
              containerPort: 7233
            - name: ui
              containerPort: 8080
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
# Runs the FastAPI gateway replicas that accept tenant allocation requests.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: gpu-tenant-orchestrator
  labels:
    app.kubernetes.io/name: gpu-tenant-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: gpu-tenant-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gpu-tenant-api
    spec:
      serviceAccountName: gpu-tenant-api
      containers:
        - name: api
          image: gpu-tenant-orchestrator-api:local
          imagePullPolicy: Never
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
            runAsUser: 10001
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: gpu-tenant-config
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
# Runs the Temporal worker and Kafka dispatcher with health and metrics endpoints.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: gpu-tenant-orchestrator
  labels:
    app.kubernetes.io/name: gpu-tenant-worker
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: gpu-tenant-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gpu-tenant-worker
    spec:
      serviceAccountName: gpu-tenant-worker
      containers:
        - name: worker
          image: gpu-tenant-orchestrator-worker:local
          imagePullPolicy: Never
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
            runAsUser: 10001
          ports:
            - name: health
              containerPort: 8081
          envFrom:
            - configMapRef:
                name: gpu-tenant-config
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
---
# Runs Prometheus with local scrape targets for API and worker metrics.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: gpu-tenant-orchestrator
  labels:
    app.kubernetes.io/name: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.45.0
          args:
            - --config.file=/etc/prometheus/prometheus.yml
          ports:
            - name: http
              containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: prometheus-config
---
# Runs Grafana for local dashboard access.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: gpu-tenant-orchestrator
  labels:
    app.kubernetes.io/name: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.0.0
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
          volumeMounts:
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: grafana-dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: grafana-dashboards
              mountPath: /var/lib/grafana/dashboards
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: grafana-datasources
          configMap:
            name: grafana-datasource-config
        - name: grafana-dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: grafana-dashboards
          configMap:
            name: grafana-dashboard-config
