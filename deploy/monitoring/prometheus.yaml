global:
  scrape_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
  - job_name: gpu-tenant-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
  - job_name: gpu-tenant-worker
    metrics_path: /metrics
    static_configs:
      - targets: ["worker:8081"]
